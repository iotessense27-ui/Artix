<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ARTIX 2026 – Check In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#D90429;--black:#090909;--black2:#111;--white:#fff;--gray:#6b6b6b;--lgray:#bbb;--border:rgba(255,255,255,0.08);--green:#22c55e;--orange:#f97316}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;height:100vh;height:100dvh;overflow:hidden}

/* LOGIN */
#loginScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;z-index:100;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(217,4,41,.18) 0%,transparent 70%)}
.lcard{background:var(--black2);border:1px solid var(--border);border-radius:12px;padding:36px 28px;width:100%;max-width:340px;text-align:center}
.ltitle{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;margin-bottom:4px}
.ltitle span{color:var(--red)}
.lsub{color:var(--gray);font-size:13px;margin-bottom:26px}
.lf{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;text-align:left}
.lf label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);font-weight:600}
.lf input{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:6px;padding:12px 13px;color:var(--white);font-size:15px;outline:none;width:100%;transition:border-color .2s}
.lf input:focus{border-color:var(--red)}
.lerr{color:var(--red);font-size:12px;min-height:16px;margin-bottom:6px}
.lbtn{width:100%;background:var(--red);border:none;border-radius:6px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;padding:13px;cursor:pointer;margin-top:4px}
.lbtn:active{background:#a80220}

/* APP */
#app{display:none;flex-direction:column;height:100vh;height:100dvh}

/* TOPBAR */
.topbar{background:var(--black2);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.brand{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.brand span{color:var(--red)}
.counter{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:var(--lgray)}
.counter strong{color:var(--green);font-size:16px}

/* CAMERA */
.cam-wrap{flex:1;position:relative;overflow:hidden;background:#000}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* SCAN FRAME */
.frame-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);transition:all .3s}
.frame-box.qr  {width:min(240px,65vw);height:min(240px,65vw)}
.frame-box.bar {width:min(320px,86vw);height:min(110px,30vw)}
.corner{position:absolute;width:36px;height:36px;border-color:var(--red);border-style:solid}
.tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);animation:sl 1.8s ease-in-out infinite}
@keyframes sl{0%,100%{top:2%}50%{top:94%}}
.scan-hint{position:absolute;bottom:22%;left:50%;transform:translateX(-50%);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);white-space:nowrap;pointer-events:none}
.status-dot{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);pointer-events:none}
.status-dot.ready{color:var(--green)}
.status-dot.busy{color:var(--orange)}

/* RESULT */
#resultOverlay{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center}
#resultOverlay.show{display:flex}
#resultOverlay.success   {background:rgba(3,18,8,.97)}
#resultOverlay.duplicate {background:rgba(18,3,3,.97)}
#resultOverlay.notfound  {background:rgba(18,12,3,.97)}
#resultOverlay.unapproved{background:rgba(18,12,3,.97)}
.res-icon{font-size:64px;margin-bottom:10px;line-height:1}
.res-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:4px;margin-bottom:16px}
#resultOverlay.success    .res-title{color:var(--green)}
#resultOverlay.duplicate  .res-title{color:var(--red)}
#resultOverlay.notfound   .res-title{color:var(--orange)}
#resultOverlay.unapproved .res-title{color:var(--orange)}
.res-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;width:100%;max-width:310px;margin-bottom:16px;text-align:left}
.rrow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.rrow:last-child{border-bottom:none}
.rk{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray);flex-shrink:0}
.rv{font-size:14px;font-weight:600;text-align:right;word-break:break-word}
.rv.red{color:var(--red)}.rv.green{color:var(--green)}.rv.orange{color:var(--orange)}
.dismiss-btn{width:100%;max-width:310px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:19px;letter-spacing:2px;padding:15px;cursor:pointer}

/* CAM ERROR */
#camErr{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px;text-align:center;background:#000;z-index:25}
#camErr p{color:var(--lgray);font-size:14px;line-height:1.9}
#camErr button{background:var(--red);border:none;color:#fff;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:16px;padding:11px 24px;cursor:pointer}

/* BOTTOM BUTTONS */
.btns{position:absolute;bottom:14px;left:0;right:0;display:flex;justify-content:space-between;padding:0 14px;z-index:20;pointer-events:none}
.mode-toggle{display:flex;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);border-radius:8px;overflow:hidden;pointer-events:all}
.mbtn{background:none;border:none;color:rgba(255,255,255,.5);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;padding:10px 14px;cursor:pointer;transition:all .15s}
.mbtn.active{background:var(--red);color:#fff}
.manual-btn{background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);color:var(--lgray);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;padding:10px 14px;border-radius:8px;cursor:pointer;pointer-events:all}

/* STATS */
.stats-bar{background:var(--black2);border-top:1px solid var(--border);padding:10px 0;display:flex;flex-shrink:0}
.stat{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.stat:not(:last-child)::after{content:'';position:absolute;right:0;top:10%;height:80%;width:1px;background:var(--border)}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1}
.stat-l{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray);margin-top:2px}
.stat.in .stat-n{color:var(--green)}.stat.rem .stat-n{color:var(--orange)}.stat.tot .stat-n{color:#fff}

/* MANUAL MODAL */
.mback{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:99;display:none;align-items:flex-end;justify-content:center}
.mback.on{display:flex}
.mmodal{background:var(--black2);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:24px 20px 40px}
.mmodal h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:16px}
.mrow{display:flex;gap:9px;margin-bottom:12px}
.mrow input{flex:1;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:6px;padding:12px 13px;color:#fff;font-size:15px;outline:none;text-transform:uppercase}
.mrow input:focus{border-color:var(--red)}
.mrow button{background:var(--red);border:none;border-radius:6px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:16px;padding:0 20px;cursor:pointer}
.mcancel{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;color:var(--lgray);font-family:'Barlow Condensed',sans-serif;font-size:14px;padding:12px;cursor:pointer;margin-top:4px}

.flash{position:fixed;inset:0;pointer-events:none;z-index:200;opacity:0;transition:opacity .08s}
.flash.go{opacity:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lcard">
    <div class="ltitle">ARTIX <span>2026</span></div>
    <div class="lsub">Entry Check-In Scanner</div>
    <div class="lf"><label>Username</label><input type="text" id="luser" placeholder="iot@123" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="lf"><label>Password</label><input type="password" id="lpass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" onclick="doLogin()">Start Scanning →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand">ARTIX <span>2026</span></div>
    <div class="counter">In: <strong id="cntIn">0</strong> / <span id="cntTotal">0</span></div>
  </div>

  <div class="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none"></canvas>

    <div class="frame-box qr" id="frameBox">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scanline"></div>
    </div>

    <div class="scan-hint" id="scanHint">Point at QR code</div>
    <div class="status-dot" id="statusDot">Starting…</div>

    <div id="resultOverlay">
      <div class="res-icon"  id="resIcon"></div>
      <div class="res-title" id="resTitle"></div>
      <div class="res-card"  id="resCard"></div>
      <button class="dismiss-btn" onclick="dismiss()">▶ &nbsp;Scan Next</button>
    </div>

    <div id="camErr">
      <div style="font-size:48px">📵</div>
      <p id="camErrTxt">Camera access denied.<br><br>
        Must be opened via <strong>https://</strong><br><br>
        Upload to <strong>netlify.com/drop</strong> → open https link on phone.</p>
      <button onclick="location.reload()">Retry</button>
    </div>

    <div class="btns">
      <div class="mode-toggle">
        <button class="mbtn active" id="btnQR"  onclick="setMode('qr')">▣ QR</button>
        <button class="mbtn"        id="btnBar" onclick="setMode('bar')">▤ Barcode</button>
      </div>
      <button class="manual-btn" onclick="openManual()">⌨ Manual</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat in" ><div class="stat-n" id="statIn">0</div><div class="stat-l">Checked In</div></div>
    <div class="stat rem"><div class="stat-n" id="statRem">0</div><div class="stat-l">Remaining</div></div>
    <div class="stat tot"><div class="stat-n" id="statTotal">0</div><div class="stat-l">Approved</div></div>
  </div>
</div>

<!-- MANUAL -->
<div class="mback" id="manualModal">
  <div class="mmodal">
    <h3>Manual Check-In</h3>
    <div class="mrow">
      <input type="text" id="manualRoll" placeholder="ROLL NUMBER" onkeydown="if(event.key==='Enter')manualGo()">
      <button onclick="manualGo()">Go</button>
    </div>
    <button class="mcancel" onclick="closeManual()">Cancel</button>
  </div>
</div>

<div class="flash" id="flash"></div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
'use strict';

const ADMIN_USER = 'iot@123';
const ADMIN_HASH = 'b1028bf44a65c1cb37ee8adb2509c960be9fb7d185714f4942502cef92c6e7b9';
const SB  = 'https://ofidwodbhfchymlacukz.supabase.co';
const KEY = 'sb_publishable_hGhBZDOK8dPGZpE9uKLQhw_4QkBgo6U';

let mode      = 'qr';
let paused    = false;
let lastVal   = '';
let lastTime  = 0;
let detectors = {};

// ── SUPABASE ──────────────────────────────────────────────────────────────────
function sbFetch(path, opts={}) {
  return fetch(SB + path, {
    ...opts,
    headers:{ apikey:KEY, Authorization:'Bearer '+KEY, 'Content-Type':'application/json', Prefer:opts.prefer||'' }
  });
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const u = document.getElementById('luser').value.trim();
  const p = document.getElementById('lpass').value;
  const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (u===ADMIN_USER && hash===ADMIN_HASH) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    init();
    loadStats();
  } else {
    document.getElementById('lerr').textContent = 'Wrong credentials.';
    setTimeout(()=>{ document.getElementById('lerr').textContent=''; }, 2500);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  dot('Starting…','');

  // Build detectors
  if ('BarcodeDetector' in window) {
    try {
      const sup = await BarcodeDetector.getSupportedFormats().catch(()=>[]);
      // QR detector
      detectors.qr = new BarcodeDetector({ formats: ['qr_code'] });
      // Barcode detector
      const bf = ['code_128','code_39','ean_13','ean_8'].filter(f=> !sup.length || sup.includes(f));
      if (bf.length) detectors.bar = new BarcodeDetector({ formats: bf });
    } catch(e) { console.warn('BarcodeDetector err:', e); }
  }

  // Start camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:'environment' }, width:{ ideal:1280 }, height:{ ideal:720 } }
    });
    const v = document.getElementById('video');
    v.srcObject = stream;
    await new Promise(r=>{ v.onloadedmetadata=r; });
    await v.play();
    dot('Ready','ready');
    loop();
  } catch(err) {
    document.getElementById('camErr').style.display = 'flex';
    if (err.name==='NotAllowedError') {
      document.getElementById('camErrTxt').innerHTML =
        '📵 <strong>Camera blocked</strong><br><br>Upload to <strong>netlify.com/drop</strong> and open the https:// link on your phone.';
    }
    dot('Camera error','');
  }
}

// ── SCAN LOOP ─────────────────────────────────────────────────────────────────
let _scanTimer = null;

function loop() {
  if (paused) { _scanTimer = setTimeout(loop, 400); return; }

  const v = document.getElementById('video');
  if (v.readyState < 2 || v.videoWidth === 0) { _scanTimer = setTimeout(loop, 400); return; }

  if (mode === 'qr') {
    // QR mode — jsQR canvas scan (works on all browsers incl iPhone Safari)
    if (typeof jsQR !== 'function') { _scanTimer = setTimeout(loop, 400); return; }
    try {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const scale  = Math.min(1, 400 / v.videoWidth);
      const sw = Math.round(v.videoWidth  * scale);
      const sh = Math.round(v.videoHeight * scale);
      const pad = 24; // white border so QR finder patterns aren't clipped by dark bg
      canvas.width  = sw + pad * 2;
      canvas.height = sh + pad * 2;
      // Fill white first — this creates the margin around the video frame
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      // Draw video into centre with contrast boost
      ctx.filter = 'contrast(1.5) brightness(1.15)';
      ctx.drawImage(v, 0, 0, v.videoWidth, v.videoHeight, pad, pad, sw, sh);
      ctx.filter = 'none';
      const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, canvas.width, canvas.height, { inversionAttempts: 'attemptBoth' });
      if (code) { onDetected(code.data); return; }
    } catch(e) { console.warn('jsQR:', e); }
    _scanTimer = setTimeout(loop, 400);

  } else {
    // Barcode mode — BarcodeDetector (native, works for Code128 ID cards)
    const det = detectors.bar;
    if (!det) { _scanTimer = setTimeout(loop, 400); return; }
    det.detect(v).then(codes => {
      if (codes.length > 0) { onDetected(codes[0].rawValue); return; }
      _scanTimer = setTimeout(loop, 400);
    }).catch(() => { _scanTimer = setTimeout(loop, 400); });
  }
}

function onDetected(val) {
  const now = Date.now();
  if (val === lastVal && now - lastTime < 4000) { _scanTimer = setTimeout(loop, 400); return; }
  lastVal = val; lastTime = now;
  paused  = true;
  dot('Processing…', 'busy');
  handleScan(val);
}

// ── HANDLE SCAN ───────────────────────────────────────────────────────────────
async function handleScan(raw) {
  let rollno = '';
  try {
    const p = JSON.parse(raw);
    rollno = (p.roll || p.rollno || p.r || '').toUpperCase().trim();
  } catch(_) {
    rollno = raw.toUpperCase().trim();
  }
  if (!rollno) { showResult('notfound', null, 'Unreadable code'); return; }
  await processCheckin(rollno);
}

// ── CHECKIN ───────────────────────────────────────────────────────────────────
async function processCheckin(rollno) {
  try {
    const res  = await sbFetch('/rest/v1/registrations?rollno=eq.'+encodeURIComponent(rollno)+'&select=*');
    const data = await res.json();

    if (!data||!data.length) { flash('orange'); vib([300]); showResult('notfound',null,rollno+'\n\nNot registered.'); return; }
    const rec = data[0];
    if (rec.status!=='Approved') { flash('orange'); vib([200,100,200]); showResult('unapproved',rec,'Status: '+(rec.status||'Pending')); return; }
    if (rec.checked_in) { flash('red'); vib([200,80,200,80,200]); showResult('duplicate',rec,null); return; }

    await sbFetch('/rest/v1/registrations?id=eq.'+rec.id, {
      method:'PATCH', prefer:'return=minimal',
      body:JSON.stringify({ checked_in:true, checked_in_at:new Date().toISOString() })
    });
    flash('green'); vib([80]);
    showResult('success', rec, null);
    loadStats();
  } catch(e) {
    showResult('notfound', null, 'Network error — try again');
  }
}

// ── RESULT ────────────────────────────────────────────────────────────────────
const CFG = {
  success:   {icon:'✅',title:'CHECKED IN ✓'},
  duplicate: {icon:'🚫',title:'ALREADY IN'},
  notfound:  {icon:'❓',title:'NOT FOUND'},
  unapproved:{icon:'⚠️',title:'NOT APPROVED'}
};
function showResult(type, rec, msg) {
  const o = document.getElementById('resultOverlay');
  o.className = 'show '+type;
  document.getElementById('resIcon').textContent  = CFG[type].icon;
  document.getElementById('resTitle').textContent = CFG[type].title;
  let html = '';
  if (rec) {
    html += rr('Name', rec.name);
    html += rr('Roll No', rec.rollno);
    if (rec.branch) html += rr('Branch', rec.branch);
    html += rr('Event', rec.event);
    if (type==='duplicate'&&rec.checked_in_at)
      html += rr('Entered At', new Date(rec.checked_in_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}), 'red');
    if (type==='unapproved') html += rr('Status', rec.status||'Pending','orange');
  } else { html += rr('Info', msg); }
  document.getElementById('resCard').innerHTML = html;
}
function rr(k,v,c='') {
  return `<div class="rrow"><span class="rk">${k}</span><span class="rv ${c}">${v||'—'}</span></div>`;
}
function dismiss() {
  document.getElementById('resultOverlay').className = '';
  dot('Ready','ready');
  lastVal = '';
  setTimeout(()=>{ paused=false; loop(); }, 400);
}

// ── MODE ──────────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btnQR').classList.toggle('active', m==='qr');
  document.getElementById('btnBar').classList.toggle('active', m==='bar');
  document.getElementById('frameBox').className = 'frame-box '+(m==='qr'?'qr':'bar');
  document.getElementById('scanHint').textContent = m==='qr' ? 'Point at QR code' : 'Point at ID card barcode';
  lastVal = '';
  dot('Ready','ready');
}

// ── STATS ─────────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const res  = await sbFetch('/rest/v1/registrations?select=checked_in&status=eq.Approved');
    const data = await res.json();
    if (!Array.isArray(data)) return;
    const tot=data.length, cin=data.filter(r=>r.checked_in).length;
    document.getElementById('statIn').textContent    = cin;
    document.getElementById('statRem').textContent   = tot-cin;
    document.getElementById('statTotal').textContent = tot;
    document.getElementById('cntIn').textContent     = cin;
    document.getElementById('cntTotal').textContent  = tot;
  } catch(_){}
}

// ── MANUAL ────────────────────────────────────────────────────────────────────
function openManual() { document.getElementById('manualModal').classList.add('on'); setTimeout(()=>document.getElementById('manualRoll').focus(),250); }
function closeManual(){ document.getElementById('manualModal').classList.remove('on'); document.getElementById('manualRoll').value=''; }
async function manualGo() {
  const roll = document.getElementById('manualRoll').value.trim().toUpperCase();
  if (!roll) return;
  closeManual(); paused=true;
  await processCheckin(roll);
}
document.getElementById('manualModal').addEventListener('click', e=>{ if(e.target===document.getElementById('manualModal')) closeManual(); });

// ── HELPERS ───────────────────────────────────────────────────────────────────
function dot(t,c){ const d=document.getElementById('statusDot'); d.textContent=t; d.className='status-dot '+c; }
