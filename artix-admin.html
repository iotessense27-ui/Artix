<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTIX 2026 – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--red:#D90429;--red-dark:#a80220;--black:#090909;--black2:#111;--black3:#181818;--white:#fff;--soft:#ececec;--gray:#6b6b6b;--lgray:#bbb;--border:rgba(255,255,255,0.07);--green:#22c55e;--orange:#f97316;--blue:#3b82f6}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 65% 55% at 50% 0%,rgba(217,4,41,.2) 0%,transparent 70%)}
.lcard{background:var(--black2);border:1px solid var(--border);border-radius:10px;padding:42px 38px;width:100%;max-width:390px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.65)}
.ltitle{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:4px;margin-bottom:3px}
.ltitle span{color:var(--red)}
.lsub{color:var(--gray);font-size:13px;margin-bottom:30px}
.lf{display:flex;flex-direction:column;gap:6px;margin-bottom:13px;text-align:left}
.lf label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);font-weight:600}
.lf input{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.09);border-radius:5px;padding:12px 13px;color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.lf input:focus{border-color:var(--red)}
.lerr{color:var(--red);font-size:13px;margin-bottom:9px;min-height:17px}
.lbtn{width:100%;background:var(--red);border:none;border-radius:5px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;padding:14px;cursor:pointer;margin-top:6px}
.lbtn:hover{background:var(--red-dark)}
#panel{display:none}
.topbar{background:var(--black2);border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50}
.brand{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px}
.brand span{color:var(--red)}
.tright{display:flex;align-items:center;gap:14px}
.tuser{font-size:13px;color:var(--gray)}
.logoutbtn{background:rgba(217,4,41,.1);border:1px solid rgba(217,4,41,.2);color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 13px;border-radius:4px;cursor:pointer}
.main{max-width:1180px;margin:0 auto;padding:26px 20px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:24px}
.sc{background:var(--black2);border:1px solid var(--border);border-radius:7px;padding:17px 19px}
.sn{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;line-height:1}
.sk{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray);margin-top:2px}
.sc.total .sn{color:var(--white)}.sc.pend .sn{color:var(--orange)}.sc.appr .sn{color:var(--green)}.sc.expo .sn{color:var(--blue)}
.filters{display:flex;align-items:center;gap:9px;margin-bottom:18px;flex-wrap:wrap}
.fb{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--gray);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;padding:6px 14px;border-radius:4px;cursor:pointer;transition:all .2s}
.fb:hover{border-color:rgba(255,255,255,.18);color:var(--white)}
.fb.on{background:rgba(217,4,41,.1);border-color:var(--red);color:var(--white)}
.fsearch{flex:1;min-width:160px;max-width:260px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;padding:7px 11px;color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;outline:none}
.fsearch:focus{border-color:var(--red)}
.fsearch::placeholder{color:rgba(255,255,255,.18)}
.rfbtn{background:transparent;border:1px solid var(--border);color:var(--gray);font-size:16px;width:33px;height:33px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.rfbtn:hover{border-color:var(--red);color:var(--red)}
.twrap{background:var(--black2);border:1px solid var(--border);border-radius:8px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead{background:rgba(255,255,255,.03)}
th{padding:11px 13px;text-align:left;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray);font-weight:600;border-bottom:1px solid var(--border)}
td{padding:11px 13px;border-bottom:1px solid rgba(255,255,255,.035);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.018)}
.ss-thumb{width:44px;height:44px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer;display:block;transition:transform .15s}
.ss-thumb:hover{transform:scale(1.12);border-color:var(--red)}
.ss-none{color:var(--gray);font-size:12px}
.bdg{display:inline-block;padding:3px 9px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.b-pend{background:rgba(249,115,22,.1);color:var(--orange);border:1px solid rgba(249,115,22,.22)}
.b-appr{background:rgba(34,197,94,.09);color:var(--green);border:1px solid rgba(34,197,94,.18)}
.b-rej{background:rgba(217,4,41,.09);color:var(--red);border:1px solid rgba(217,4,41,.18)}
.b-reg{background:rgba(255,255,255,.05);color:var(--lgray)}
.b-expo{background:rgba(59,130,246,.09);color:var(--blue);border:1px solid rgba(59,130,246,.18)}
.acts{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.bappr{background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.22);color:var(--green);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;padding:5px 11px;border-radius:4px;cursor:pointer;white-space:nowrap}
.bappr:hover{background:rgba(34,197,94,.18)}
.brej{background:rgba(217,4,41,.07);border:1px solid rgba(217,4,41,.18);color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;padding:5px 11px;border-radius:4px;cursor:pointer;white-space:nowrap}
.brej:hover{background:rgba(217,4,41,.15)}
.bview{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--lgray);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;padding:5px 11px;border-radius:4px;cursor:pointer;white-space:nowrap}
.bview:hover{border-color:rgba(255,255,255,.2);color:#fff}
.bqr{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.14);color:var(--green);font-size:14px;width:29px;height:29px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.bqr:hover{background:rgba(34,197,94,.16)}
.bmail{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:var(--blue);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;padding:5px 11px;border-radius:4px;cursor:pointer;white-space:nowrap}
.bmail:hover{background:rgba(59,130,246,.18)}
.bmail.sent{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.2);color:var(--green);cursor:default}
.bmail.sending{opacity:.5;cursor:not-allowed}
.bulk-bar{display:flex;align-items:center;gap:10px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:6px;padding:10px 15px;margin-bottom:16px}
.bulk-bar span{font-size:13px;color:var(--lgray);flex:1}
.bbulk{background:var(--blue);border:none;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;padding:7px 16px;border-radius:4px;cursor:pointer;white-space:nowrap}
.bbulk:hover{background:#2563eb}.bbulk:disabled{opacity:.45;cursor:not-allowed}
.empty .ico{font-size:38px;margin-bottom:10px}
.mback{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(7px)}
.mback.on{display:flex}
.modal{background:var(--black2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--black2);z-index:1}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:3px}
.mclose{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--gray);width:30px;height:30px;border-radius:4px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.mclose:hover{color:#fff}
.mbody{padding:22px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px}
.mgrid .full{grid-column:1/-1}
.mf{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:5px;padding:10px 12px}
.mk{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray);margin-bottom:2px}
.mv{font-size:14px;color:var(--soft)}
.macts{display:flex;gap:9px;margin-top:6px}
.macts .bappr,.macts .brej{flex:1;padding:11px;font-size:13px;letter-spacing:1.5px}
.ss-section{margin-bottom:18px}
.ss-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray);font-weight:600;margin-bottom:8px}
.ss-img{width:100%;max-height:320px;object-fit:contain;border-radius:6px;border:1px solid var(--border);display:block;cursor:zoom-in}
.ss-img:hover{border-color:var(--red)}
.ss-actions{display:flex;gap:12px;margin-top:8px;font-size:12px}
.ss-dl{color:var(--red);text-decoration:none}.ss-dl:hover{color:var(--soft)}
.ss-hint{color:var(--gray)}
.ss-missing{padding:12px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:5px;color:var(--gray);font-size:13px}
#qrModal .modal{max-width:360px}
.qrmb{text-align:center;padding:26px}
#adminQRbox{display:inline-block;background:#fff;padding:13px;border-radius:6px;margin-bottom:14px}
.qrpname{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px;margin-bottom:3px}
.qrproll{font-size:13px;color:var(--gray);margin-bottom:14px}
.dlqr{background:var(--green);color:#0a0a0a;border:none;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;padding:10px 22px;cursor:pointer}
#ssOverlay{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
#ssOverlay.on{display:flex}
#ssOverlay img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px}
#ssOverlay .ss-close{position:absolute;top:18px;right:22px;color:#fff;font-size:26px;cursor:pointer;background:rgba(255,255,255,.1);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.loader{text-align:center;padding:44px;color:var(--gray)}
.spin{width:26px;height:26px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:22px;right:22px;background:var(--black3);border:1px solid var(--border);border-radius:6px;padding:11px 18px;font-size:14px;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}
.toast.ok{border-color:rgba(34,197,94,.3);color:var(--green)}
.toast.err{border-color:rgba(217,4,41,.3);color:var(--red)}
@media(max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}.topbar{padding:0 14px}.main{padding:18px 13px}.mgrid{grid-template-columns:1fr}.mgrid .full{grid-column:1}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lcard">
    <div class="ltitle">ARTIX <span>Admin</span></div>
    <div class="lsub">ARTIX 2026 · Department of CSE–IoT</div>
    <div class="lf"><label>Username</label><input type="text" id="luser" placeholder="username" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="lf"><label>Password</label><input type="password" id="lpass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" onclick="doLogin()">Login →</button>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="topbar">
    <div class="brand">ARTIX <span>2026</span> Admin</div>
    <div class="tright">
      <span class="tuser">iot@123</span>
      <button class="logoutbtn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="main">
    <div class="stats">
      <div class="sc total"><div class="sn" id="stTotal">—</div><div class="sk">Total</div></div>
      <div class="sc pend"><div class="sn" id="stPend">—</div><div class="sk">Pending</div></div>
      <div class="sc appr"><div class="sn" id="stAppr">—</div><div class="sk">Approved</div></div>
      <div class="sc expo"><div class="sn" id="stExpo">—</div><div class="sk">Project Expo</div></div>
    </div>
    <div class="filters">
      <button class="fb on" data-f="All" onclick="setF(this)">All</button>
      <button class="fb" data-f="Pending" onclick="setF(this)">Pending</button>
      <button class="fb" data-f="Approved" onclick="setF(this)">Approved</button>
      <button class="fb" data-f="Rejected" onclick="setF(this)">Rejected</button>
      <button class="fb" data-f="expo" onclick="setF(this)">Project Expo</button>
      <input class="fsearch" type="text" placeholder="Search name / roll…" oninput="renderTable()" id="fq">
      <button class="rfbtn" onclick="loadData()" title="Refresh">↻</button>
    </div>
    <div class="bulk-bar">
      <span id="bulkInfo">📧 Send approval emails to all approved students who haven't received one yet.</span>
      <button class="bbulk" id="bulkBtn" onclick="bulkSendMails()">✉ Bulk Send Emails</button>
    </div>
    <div class="twrap" id="tw"><div class="loader"><div class="spin"></div></div></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="mback" id="detModal">
  <div class="modal">
    <div class="mhead"><div class="mtitle">Registration Details</div><button class="mclose" onclick="closeM('detModal')">✕</button></div>
    <div class="mbody" id="detBody"></div>
  </div>
</div>

<!-- QR MODAL -->
<div class="mback" id="qrModal">
  <div class="modal">
    <div class="mhead"><div class="mtitle">Confirmation QR</div><button class="mclose" onclick="closeM('qrModal')">✕</button></div>
    <div class="qrmb">
      <div id="adminQRbox"></div>
      <div class="qrpname" id="qrName"></div>
      <div class="qrproll" id="qrRoll"></div>
      <button class="dlqr" id="dlQRbtn">⬇ Download QR Card</button>
    </div>
  </div>
</div>

<!-- FULLSCREEN SCREENSHOT -->
<div id="ssOverlay" onclick="closeSS()">
  <button class="ss-close" onclick="closeSS()">✕</button>
  <img id="ssOverlayImg" src="" alt="Screenshot">
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_USER = 'iot@123';
const ADMIN_HASH = 'b1028bf44a65c1cb37ee8adb2509c960be9fb7d185714f4942502cef92c6e7b9';
const SB  = 'https://ofidwodbhfchymlacukz.supabase.co';
const KEY = 'sb_publishable_hGhBZDOK8dPGZpE9uKLQhw_4QkBgo6U';

let recs = [], curF = 'All';

function sb(path, opts={}) {
  return fetch(SB + path, {
    ...opts,
    headers: { apikey:KEY, Authorization:'Bearer '+KEY, 'Content-Type':'application/json', Prefer:opts.prefer||'', ...(opts.headers||{}) }
  });
}

// ── LOGIN ─────────────────────────────────────────────
async function doLogin(){
  const u = document.getElementById('luser').value.trim();
  const p = document.getElementById('lpass').value;
  const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(u === ADMIN_USER && hash === ADMIN_HASH){
    document.getElementById('login').style.display='none';
    document.getElementById('panel').style.display='block';
    loadData();
  } else {
    document.getElementById('lerr').textContent='Invalid credentials.';
    setTimeout(()=>document.getElementById('lerr').textContent='',3000);
  }
}
function logout(){
  document.getElementById('panel').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('luser').value='';
  document.getElementById('lpass').value='';
  recs=[];
}

// ── LOAD DATA — direct Supabase REST, zero CORS issues ──
async function loadData(){
  document.getElementById('tw').innerHTML='<div class="loader"><div class="spin"></div></div>';
  try {
    const res = await sb('/rest/v1/registrations?select=*&order=created_at.desc');
    if(!res.ok) throw new Error('HTTP '+res.status);
    recs = await res.json();
    updateStats();
    renderTable();
  } catch(err) {
    document.getElementById('tw').innerHTML=
      `<div class="empty"><div class="ico">⚠️</div>Could not load data: ${err.message}</div>`;
  }
}

function updateStats(){
  document.getElementById('stTotal').textContent=recs.length;
  document.getElementById('stPend').textContent=recs.filter(r=>!r.status||r.status==='Pending').length;
  document.getElementById('stAppr').textContent=recs.filter(r=>r.status==='Approved').length;
  document.getElementById('stExpo').textContent=recs.filter(r=>(r.event||'').includes('Expo')).length;
  // Update bulk bar info
  const unsent=recs.filter(r=>r.status==='Approved'&&!r.mail_sent&&r.email).length;
  document.getElementById('bulkInfo').textContent = unsent > 0
    ? `📧 ${unsent} approved student${unsent>1?'s':''} haven't received an email yet.`
    : `✓ All approved students have been emailed.`;
}

function setF(btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); curF=btn.dataset.f; renderTable();
}

// ── TABLE ─────────────────────────────────────────────
function renderTable(){
  const q=(document.getElementById('fq').value||'').toLowerCase();
  const rows=recs.filter(r=>{
    const fok=curF==='All'||(curF==='expo'?(r.event||'').includes('Expo'):r.status===curF);
    const qok=!q||(r.name||'').toLowerCase().includes(q)||(r.rollno||'').toLowerCase().includes(q);
    return fok&&qok;
  });
  if(!rows.length){
    document.getElementById('tw').innerHTML='<div class="empty"><div class="ico">📋</div>No registrations found.</div>';
    return;
  }
  const tbody=rows.map((r,i)=>{
    const st=r.status||'Pending';
    const sc=st==='Approved'?'b-appr':st==='Rejected'?'b-rej':'b-pend';
    const ec=(r.event||'').includes('Expo')?'b-expo':'b-reg';
    const ssThumb=r.screenshot&&r.screenshot.length>100
      ? `<img class="ss-thumb" src="${r.screenshot}" onclick="openSS('${r.id}')" title="Click to enlarge">`
      : `<span class="ss-none">—</span>`;
    return `<tr>
      <td style="color:var(--gray);font-size:12px">${i+1}</td>
      <td style="font-weight:500;color:var(--soft)">${r.name||'—'}</td>
      <td style="font-family:'Barlow Condensed',sans-serif;color:var(--lgray)">${r.rollno||'—'}</td>
      <td><span class="bdg ${ec}">${r.event||'Reg'}</span></td>
      <td>${ssThumb}</td>
      <td><span class="bdg ${sc}">${st}</span></td>
      <td><div class="acts">
        <button class="bview" onclick="viewRec('${r.id}')">View</button>
        ${st!=='Approved'?`<button class="bappr" onclick="updStatus('${r.id}','Approved')">✓</button>`:''}
        ${st!=='Rejected'?`<button class="brej"  onclick="updStatus('${r.id}','Rejected')">✕</button>`:''}
        ${st==='Approved'?`<button class="bqr"   onclick="showQR('${r.id}')" title="QR">⊞</button>`:''}
        ${st==='Approved'?`<button class="bmail ${r.mail_sent?'sent':''}" ${r.mail_sent?'disabled title="Email sent"':'onclick="sendMail(this,\''+r.id+'\')"'}>${r.mail_sent?'✓ Sent':'✉ Mail'}</button>`:''}
      </div></td>
    </tr>`;
  }).join('');
  document.getElementById('tw').innerHTML=`<table>
    <thead><tr><th>#</th><th>Name</th><th>Roll No</th><th>Event</th><th>Screenshot</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${tbody}</tbody>
  </table>`;
}

// ── SCREENSHOT FULLSCREEN ─────────────────────────────
function openSS(id){
  const r=recs.find(x=>x.id===id); if(!r||!r.screenshot) return;
  document.getElementById('ssOverlayImg').src=r.screenshot;
  document.getElementById('ssOverlay').classList.add('on');
}
function closeSS(){
  document.getElementById('ssOverlay').classList.remove('on');
  document.getElementById('ssOverlayImg').src='';
}

async function updStatus(id, status){
  try {
    await sb('/rest/v1/registrations?id=eq.'+id, {method:'PATCH', prefer:'return=minimal', body:JSON.stringify({status})});
    const r=recs.find(x=>x.id===id); if(r) r.status=status;
    updateStats(); renderTable();
    toast((r?r.rollno:id)+' → '+status, status==='Approved'?'ok':'err');
    if(status==='Approved'){
      setTimeout(()=>showQR(id),400);
      // Auto-send email on approval
      setTimeout(()=>sendMail(null, id, true), 1200);

  } catch(e){ toast('Update failed','err'); }
}

// Build QR card as base64 PNG using canvas
function buildQRCard(r){
  return new Promise(resolve => {
    // Render QR into a hidden div
    const tmp = document.createElement('div');
    tmp.style.cssText = 'position:fixed;left:-9999px;top:-9999px;background:#fff;padding:13px;';
    document.body.appendChild(tmp);
    const qr = new QRCode(tmp, {
      text: JSON.stringify({name:r.name,roll:r.rollno,event:r.event,college:'MRDU',artix:'2026',status:'APPROVED'}),
      width:200, height:200, colorDark:'#000000', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.H
    });
    setTimeout(()=>{
      const qrCanvas = tmp.querySelector('canvas');
      const c = document.createElement('canvas'); c.width=440; c.height=560;
      const x = c.getContext('2d');
      // Background
      x.fillStyle='#0a0a0a'; x.fillRect(0,0,440,560);
      // Top red bar
      x.fillStyle='#D90429'; x.fillRect(0,0,440,8);
      // Title
      x.fillStyle='#ffffff'; x.font='bold 54px Georgia'; x.textAlign='center'; x.fillText('ARTIX 2026',220,72);
      // Subtitle
      x.fillStyle='#D90429'; x.font='bold 12px sans-serif'; x.fillText('DEPARTMENT OF CSE – IoT  ·  MALLA REDDY DEEMED UNIVERSITY',220,96);
      // QR
      if(qrCanvas) x.drawImage(qrCanvas,120,116,200,200);
      // Name
      x.fillStyle='#ffffff'; x.font='bold 22px sans-serif'; x.fillText(r.name,220,346);
      // Roll
      x.fillStyle='#888888'; x.font='15px sans-serif'; x.fillText(r.rollno,220,370);
      // Event badge
      x.fillStyle='#22c55e'; x.font='bold 13px sans-serif'; x.fillText('✓ APPROVED  ·  '+(r.event||'').toUpperCase(),220,396);
      // Date
      x.fillStyle='#555555'; x.font='12px sans-serif'; x.fillText('16–17 March 2026  ·  Sports Complex Auditorium',220,420);
      // Bottom bar
      x.fillStyle='#D90429'; x.fillRect(0,552,440,8);
      document.body.removeChild(tmp);
      resolve(c.toDataURL('image/png').split(',')[1]); // base64 only
    },400);
  });
}

async function sendMail(btnEl, id, silent=false){
  const r = recs.find(x=>x.id===id);
  if(!r || !r.email){ if(!silent) toast('No email on record','err'); return; }
  if(r.mail_sent && !silent){ toast('Already sent to '+r.email,'ok'); return; }

  // Disable button during send
  if(btnEl && !silent){ btnEl.disabled=true; btnEl.textContent='Sending…'; }
  if(!silent) toast('Sending to '+r.email+'…','ok');

  try {
    const qrBase64 = await buildQRCard(r);
    const isExpo   = (r.event||'').includes('Expo');
    const subject  = isExpo
      ? 'ARTIX 2026 – You are in for Project Expo! 🔬'
      : "You're Approved! ARTIX 2026 Entry Pass 🎉";

    const payload = {
      sender: BREVO_FROM,
      to: [{ email: r.email, name: r.name }],
      subject,
      htmlContent: buildEmailHTML(r),
      attachment: [{
        name: 'ARTIX2026_QR_'+r.rollno+'.png',
        content: qrBase64
      }]
    };

    const res = await fetch('https://api.brevo.com/v3/smtp/email', {
      method: 'POST',
      headers: { 'api-key': BREVO_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if(!res.ok){
      const errBody = await res.json().catch(()=>({}));
      throw new Error(errBody.message || ('Brevo error ' + res.status));
    }

    // Mark mail_sent in Supabase
    await sb('/rest/v1/registrations?id=eq.'+id, {
      method:'PATCH', prefer:'return=minimal',
      body: JSON.stringify({ mail_sent: true })
    });
    r.mail_sent = true;
    renderTable();
    if(!silent) toast('✓ Email sent to '+r.email,'ok');

  } catch(err){
    console.error('Email error:', err);
    if(btnEl && !silent){ btnEl.disabled=false; btnEl.textContent='✉ Mail'; }
    if(!silent) toast('Failed: '+err.message,'err');
    else toast('Auto-email failed for '+r.rollno+': '+err.message,'err');
  }
}

async function bulkSendMails(){
  const unsent = recs.filter(r => r.status==='Approved' && !r.mail_sent && r.email);
  if(unsent.length === 0){ toast('All approved students already emailed ✓','ok'); return; }
  const btn = document.getElementById('bulkBtn');
  btn.disabled = true;
  btn.textContent = `Sending 0 / ${unsent.length}…`;
  let sent = 0;
  for(const r of unsent){
    await sendMail(null, r.id, true);
    sent++;
    btn.textContent = `Sending ${sent} / ${unsent.length}…`;
    await new Promise(res=>setTimeout(res, 300)); // small delay between sends
  }
  btn.disabled = false;
  btn.textContent = '✉ Bulk Send Emails';
  toast(`✓ Sent ${sent} emails!`, 'ok');
  document.getElementById('bulkInfo').textContent = `📧 Send approval emails to all approved students who haven't received one yet.`;
}
